---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - builderplayground.flashbots.io
  resources:
  - builderplaygrounddeployments
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - builderplayground.flashbots.io
  resources:
  - builderplaygrounddeployments/finalizers
  verbs:
  - update
- apiGroups:
  - builderplayground.flashbots.io
  resources:
  - builderplaygrounddeployments/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - apps
  resources:
  - statefulsets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
